# ============================================================
# Dev Environment - Build & Deploy
# Builds Docker images for Spring Boot backend and Angular frontend
# ============================================================

name: Dev Environment Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/demo-backend
  FRONTEND_IMAGE: ${{ github.repository }}/demo-frontend

jobs:
  build-backend:
    name: Build Spring Boot Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: React-code/angular-demo/signals-demo-app/package-lock.json

      - name: Install dependencies
        working-directory: React-code/angular-demo/signals-demo-app
        run: npm ci

      - name: Build Angular app
        working-directory: React-code/angular-demo/signals-demo-app
        run: npx ng build --configuration=production

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./React-code/angular-demo/signals-demo-app
          file: ./React-code/angular-demo/signals-demo-app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-dev:
    name: Deploy Dev Environment
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          echo "Dev environment images built and pushed to ${{ env.REGISTRY }}"
          echo "Backend:  ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"
          echo ""
          echo "To deploy locally:"
          echo "  docker compose up --build -d"
          echo ""
          echo "Endpoints available after deployment:"
          echo "  Backend API:     http://localhost:8080"
          echo "  - Companies:     http://localhost:8080/companys"
          echo "  - Comply API:    http://localhost:8080/api/comply"
          echo "  - Analysts:      http://localhost:8080/api/analysts"
          echo "  - H2 Console:    http://localhost:8080/h2-console"
          echo "  Angular App:     http://localhost:4200"
