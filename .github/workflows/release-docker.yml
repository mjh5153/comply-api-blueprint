name: Release Docker
on:
  push:
    tags: ['v*.*.*']
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./fastapi_app
          push: true
          tags: ghcr.io/${{ github.repository }}/fastapi:${{ github.ref_name }}
      - uses: docker/build-push-action@v5
        with:
          context: ./express_app
          push: true
          tags: ghcr.io/${{ github.repository }}/express:${{ github.ref_name }}