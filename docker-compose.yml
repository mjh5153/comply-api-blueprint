version: "3.9"
services:
  fastapi:
    build: ./fastapi_app
    ports: ["8000:8000"]
    environment:
      - API_KEY=${API_KEY:-dev_key_123}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev_webhook_secret}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}
  express:
    build: ./express_app
    ports: ["3000:3000"]
    environment:
      - API_KEY=${API_KEY:-dev_key_123}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev_webhook_secret}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}